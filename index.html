<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Брокер в джоба</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EE;--sf:#fff;--ac:#1B4B8A;--al:#EBF0F9;--a2:#2D7A5F;--a2l:#E8F5F0;--tx:#1A1A1A;--tx2:#5A5A5A;--tx3:#9A9A9A;--bd:#E5E0D8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#AS{width:100%;max-width:460px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;}
.li{width:64px;height:64px;background:var(--ac);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;}
.lt{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600;letter-spacing:-0.02em;text-align:center;}
.ls{font-size:.875rem;color:var(--tx2);margin-top:.4rem;font-weight:300;text-align:center;}
.cd{background:var(--sf);border-radius:16px;padding:1.75rem;width:100%;border:1px solid var(--bd);box-shadow:0 2px 20px rgba(0,0,0,.06);}
.cd h2{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:500;margin-bottom:.5rem;}
.cd p{font-size:.875rem;color:var(--tx2);line-height:1.6;margin-bottom:1.25rem;}
.cd input{width:100%;padding:.85rem 1rem;border:1.5px solid var(--bd);border-radius:10px;font-size:.875rem;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);outline:none;transition:border-color .2s;display:block;}
.cd input:focus{border-color:var(--ac);}
.ab{width:100%;margin-top:1rem;padding:.9rem;background:var(--ac);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
.ab:hover{opacity:.9;}
.an{font-size:.775rem;color:var(--tx3);text-align:center;line-height:1.5;}
.an a{color:var(--ac);text-decoration:none;}
#AP{display:none;width:100%;max-width:520px;height:100vh;max-height:900px;flex-direction:column;background:var(--sf);overflow:hidden;box-shadow:0 2px 30px rgba(0,0,0,.1);position:relative;}
@media(min-width:600px){#AP{border-radius:24px;height:calc(100vh - 3rem);margin:1.5rem auto;}body{padding:0 1rem;}}
.hd{display:flex;align-items:center;gap:12px;padding:.85rem 1.25rem;border-bottom:1px solid var(--bd);background:var(--sf);}
.ha{width:38px;height:38px;background:var(--ac);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.hn{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;}
.hs{font-size:.7rem;color:var(--a2);display:flex;align-items:center;gap:3px;margin-top:1px;}
.hb{background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 9px;font-size:.72rem;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:auto;}
.ct{flex:1;overflow-y:auto;padding:1rem 1rem 1.25rem;display:flex;flex-direction:column;gap:.875rem;background:var(--bg);}
.ct::-webkit-scrollbar{width:3px;}
.ct::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.rw{display:flex;gap:8px;align-items:flex-end;animation:fu .25s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rw.u{flex-direction:row-reverse;}
.av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:500;}
.bav{background:var(--ac);color:#fff;font-size:13px;}
.uav{background:var(--al);color:var(--ac);}
.bb{max-width:82%;padding:.7rem .95rem;border-radius:14px;font-size:.875rem;line-height:1.6;word-break:break-word;}
.bb.b{background:#fff;color:var(--tx);border-radius:14px 14px 14px 4px;border:1px solid var(--bd);}
.bb.u{background:var(--ac);color:#fff;border-radius:14px 14px 4px 14px;}
.td{display:flex;gap:4px;padding:.5rem .4rem;align-items:center;}
.td span{width:6px;height:6px;background:var(--tx3);border-radius:50%;animation:bl 1.3s infinite;}
.td span:nth-child(2){animation-delay:.2s;}
.td span:nth-child(3){animation-delay:.4s;}
@keyframes bl{0%,80%,100%{opacity:.25;transform:scale(.85)}40%{opacity:1;transform:scale(1)}}
.ch{display:flex;flex-wrap:wrap;gap:5px;padding-left:36px;animation:fu .25s ease .1s both;}
.cp{background:#F0EDE8;border:1px solid var(--bd);border-radius:18px;padding:5px 13px;font-size:.8rem;color:var(--tx);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .12s;}
.cp:hover{background:var(--al);border-color:var(--ac);color:var(--ac);}
.ts{text-align:center;font-size:.68rem;color:var(--tx3);padding:.2rem 0;}
.bg{background:var(--a2l);border:1px solid #B8DDD0;border-radius:9px;padding:7px 11px;font-size:.75rem;color:var(--a2);margin-left:36px;display:inline-flex;gap:5px;animation:fu .25s ease;}
.pr{background:#FFF8E7;border:1px solid #F0C060;border-radius:12px;padding:.75rem 1rem;margin-left:36px;font-size:.83rem;color:#7A4F00;line-height:1.55;animation:fu .25s ease;}
.ip{padding:.65rem .875rem;background:var(--sf);border-top:1px solid var(--bd);display:flex;gap:7px;align-items:flex-end;}
.ip textarea{flex:1;border:1.5px solid var(--bd);border-radius:11px;padding:.65rem .85rem;font-size:.875rem;font-family:'DM Sans',sans-serif;color:var(--tx);background:var(--bg);resize:none;outline:none;max-height:110px;min-height:40px;line-height:1.5;transition:border-color .2s;}
.ip textarea:focus{border-color:var(--ac);}
.ip textarea::placeholder{color:var(--tx3);}
.sb{width:40px;height:40px;background:var(--ac);border:none;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb:disabled{opacity:.4;cursor:not-allowed;}
.sb svg{width:16px;height:16px;fill:#fff;}
.er{background:#FEF2F2;border:1px solid #FECACA;border-radius:9px;padding:9px 13px;font-size:.8rem;color:#B91C1C;margin-left:36px;line-height:1.5;}
.cbar{display:none;gap:6px;padding:.6rem .875rem;background:var(--sf);border-top:1px solid var(--bd);}
.ovl{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:1.5rem;}
.mbox{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:360px;border:1px solid var(--bd);}
.mbox h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:500;margin-bottom:.35rem;}
.mbox p{font-size:.8rem;color:var(--tx2);margin-bottom:1rem;line-height:1.5;}
.mbox input,.mbox select{width:100%;padding:.75rem .9rem;border:1.5px solid var(--bd);border-radius:9px;font-size:.875rem;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);outline:none;margin-bottom:.6rem;display:block;}
.mrow{display:flex;gap:8px;margin-top:.4rem;}
.mrow button{flex:1;padding:.8rem;border-radius:9px;font-size:.85rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
.mok{background:var(--ac);color:#fff;border:none;}
.mcn{background:none;border:1px solid var(--bd);color:var(--tx2);}
.msucc{text-align:center;padding:1rem 0;}
</style>
</head>
<body>

<div id="AS">
  <div>
    <div class="li">&#127968;</div>
    <div class="lt">Брокер в джоба</div>
    <div class="ls">Твоят личен имотен асистент</div>
  </div>
  <div class="cd">
    <h2>Въведи парола за достъп</h2>
    <p>Въведи паролата, предоставена от imot.space за достъп до Radost.</p>
    <input type="password" id="akey" placeholder="Парола..." autocomplete="off">
    <button class="ab" onclick="startApp()">Влез &#8594;</button>
  </div>
  <p class="an">За достъп: imot.space@gmail.com</p>
</div>

<div id="AP">
  <div class="hd">
    <div class="ha">&#127968;</div>
    <div>
      <div class="hn">Брокер в джоба</div>
      <div class="hs"><span style="width:5px;height:5px;background:var(--a2);border-radius:50%;display:inline-block"></span>&nbsp;Radost &middot; онлайн</div>
    </div>
    <button class="hb" onclick="resetChat()">Нов разговор</button>
  </div>
  <div class="ct" id="chat"></div>
  <div class="ip">
    <textarea id="ui" placeholder="Напиши въпрос..." rows="1" onkeydown="hk(event)" oninput="ar(this)"></textarea>
    <button class="sb" id="sb" onclick="snd()">
      <svg viewBox="0 0 20 20"><path d="M2.5 10L17.5 2.5L12.5 10L17.5 17.5L2.5 10Z"/></svg>
    </button>
  </div>
  <div class="cbar">
    <button onclick="openModal('credit')" style="flex:1;padding:.6rem .5rem;border-radius:9px;font-size:.75rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;background:var(--a2l);color:var(--a2);border:1px solid #B8DDD0;">&#128203; Кредитен консултант</button>
  </div>
  <div class="ovl" id="ovl">
    <div class="mbox">
      <div id="mform">
        <h3 id="mtitle">Заяви консултация</h3>
        <p id="mdesc">Оставете контакт и ще се свържем с вас скоро.</p>
        <input type="text" id="mname" placeholder="Вашето име">
        <input type="tel" id="mphone" placeholder="Телефон за връзка">
        <input type="email" id="memail" placeholder="Имейл (незадължително)">
        <select id="mtime">
          <option value="">Кога да се свържем?</option>
          <option>Сутринта (9:00-12:00)</option>
          <option>Обяд (12:00-15:00)</option>
          <option>Следобед (15:00-18:00)</option>
          <option>По всяко време</option>
        </select>
        <div class="mrow">
          <button class="mcn" onclick="closeModal()">Отказ</button>
          <button class="mok" onclick="submitForm()">Изпрати</button>
        </div>
      </div>
      <div id="msucc" class="msucc" style="display:none;">
        <div style="font-size:2rem;margin-bottom:.5rem;">&#10003;</div>
        <p id="msucctxt" style="font-size:.875rem;color:var(--tx2);">Заявката е изпратена!</p>
        <div class="mrow" style="margin-top:.75rem;">
          <button class="mok" onclick="closeModal()">Затвори</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
